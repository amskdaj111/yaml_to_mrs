name: Convert Clash Rules to MRS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    # 1. 检出代码，获取 input.txt
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 生成 release tag (格式: rules-YYYY-MM-DD-HH-mm-ss)
    - name: Generate release tag
      id: tagger
      run: |
        $tagName = "rules-$(Get-Date -Format 'yyyy-MM-dd-HH-mm-ss')"
        echo "RELEASE_TAG=$tagName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      shell: pwsh

    # 3. 下载工具并执行转换
    - name: Download and process rules
      run: |
        curl -L -o mihomo.exe https://github.com/amskdaj111/rules/releases/download/mihomo/mihomo.exe
        Remove-Item -Recurse -Force yaml, mrs -ErrorAction SilentlyContinue
        mkdir yaml, mrs
        if (-not (Test-Path -Path "input.txt")) {
          echo "input.txt not found!"
          exit 1
        }
        Get-Content input.txt | ForEach-Object {
          $url = $_.Trim()
          if ($url) {
            $baseNameWithExt = $url.Split('/')[-1]
            $prefix = $baseNameWithExt.Split('.')[0]
            $yamlFile = "$prefix.yaml"
            $mrsFile = "$prefix.mrs"
            curl -L -o $yamlFile $url
            ./mihomo.exe convert-ruleset domain yaml $yamlFile $mrsFile
            Move-Item -Path $yamlFile -Destination "yaml/"
            Move-Item -Path $mrsFile -Destination "mrs/"
          }
        }

    # 4. 创建 Release 并上传所有规则文件
    - name: Create GitHub Release and upload assets
      uses: softprops/action-gh-release@v2
      with:
        # 使用上一步生成的 tag
        tag_name: ${{ env.RELEASE_TAG }}
        # Release 标题
        name: "Rules Update ${{ env.RELEASE_TAG }}"
        body: |
          Automated rule files update.
        # 上传 yaml 和 mrs 目录下的所有文件
        files: |
          yaml/*
          mrs/*```
