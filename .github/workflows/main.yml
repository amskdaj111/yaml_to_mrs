name: Convert Clash Rules to MRS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'

jobs:
  convert:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Mihomo converter
      run: curl -L -o mihomo.exe https://github.com/amskdaj111/rules/releases/download/mihomo/mihomo.exe

    - name: Process rule files
      run: |
        Remove-Item -Recurse -Force yaml, mrs -ErrorAction SilentlyContinue
        mkdir yaml, mrs
        if (-not (Test-Path -Path "input.txt")) {
          echo "input.txt not found!"
          exit 1
        }
        Get-Content input.txt | ForEach-Object {
          $url = $_.Trim()
          if ($url) {
            $baseNameWithExt = $url.Split('/')[-1]
            $prefix = $baseNameWithExt.Split('.')[0]
            $yamlFile = "$prefix.yaml"
            $mrsFile = "$prefix.mrs"
            curl -L -o $yamlFile $url
            ./mihomo.exe convert-ruleset domain yaml $yamlFile $mrsFile
            Move-Item -Path $yamlFile -Destination "yaml/"
            Move-Item -Path $mrsFile -Destination "mrs/"
          }
        }

    # 最终方案：精确添加指定目录，并使用 Stash 安全切换分支
    - name: Commit and Push to rules-output branch
      run: |
        # 1. 配置 Git 用户
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 2. 核心改动：只添加 'yaml' 和 'mrs' 目录
        #    使用 -f (force) 参数可以无视 .gitignore 文件，确保它们一定被添加
        git add yaml mrs -f
        
        # 3. 将这些改动（包括新文件）暂存起来，让工作区变干净
        git stash push --include-untracked
        
        # 4. 安全地切换到目标分支
        #    如果本地没有，会基于远程 origin/rules-output 创建
        git checkout rules-output
        
        # 5. 在新分支上，恢复刚才暂存的内容
        git stash pop
        
        # 6. 再次添加，确保恢复后的文件进入暂存区
        git add yaml mrs -f
        
        # 7. 强制创建 commit，无论内容是否真有变化
        $timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss 'UTC'")
        git commit --allow-empty -m "chore: Scheduled rules update ($timestamp)"
        
        # 8. 推送到远程
        git push origin rules-output
      shell: pwsh
