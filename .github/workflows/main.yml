name: Convert Clash Rules to MRS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'

jobs:
  convert:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Mihomo converter
      run: curl -L -o mihomo.exe https://github.com/amskdaj111/rules/releases/download/mihomo/mihomo.exe

    - name: Process rule files
      run: |
        # 为确保每次运行都是干净的，先删除旧目录
        Remove-Item -Recurse -Force yaml, mrs -ErrorAction SilentlyContinue
        mkdir yaml, mrs

        if (-not (Test-Path -Path "input.txt")) {
          echo "input.txt not found!"
          exit 1
        }

        Get-Content input.txt | ForEach-Object {
          $url = $_.Trim()
          if ($url) {
            $baseNameWithExt = $url.Split('/')[-1]
            $prefix = $baseNameWithExt.Split('.')[0]
            
            $yamlFile = "$prefix.yaml"
            $mrsFile = "$prefix.mrs"
            
            echo "Processing URL: $url"
            curl -L -o $yamlFile $url
            
            echo "Converting $yamlFile to $mrsFile"
            ./mihomo.exe convert-ruleset domain yaml $yamlFile $mrsFile
            
            Move-Item -Path $yamlFile -Destination "yaml/"
            Move-Item -Path $mrsFile -Destination "mrs/"
          }
        }

    # 💡 关键修正: 在提交前，将生成的文件添加到暂存区
    - name: Stage generated files
      run: git add yaml mrs

    - name: Commit files to rules-output branch
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: Update rule files"
        branch: rules-output
        # 注意：因为上一步已经 add，这里的 file_pattern 变得不那么关键，但保留也无妨
        file_pattern: yaml mrs
        repository: .
        commit_user_name: github-actions[bot]
        commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
