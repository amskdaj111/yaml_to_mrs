name: Build and Release Clash Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    # 步骤 1: 检出 main 分支的代码以获取 input.txt
    - name: Checkout repository
      uses: actions/checkout@v4

    # 步骤 2: 基于当前时间生成一个唯一的、有序的Tag名称
    - name: Generate release tag
      id: tagger
      run: |
        # 格式: rules-YYYY-MM-DD-HH-mm-ss
        $tagName = "rules-$(Get-Date -Format 'yyyy-MM-dd-HH-mm-ss')"
        echo "Generated tag: $tagName"
        # 将变量输出到GitHub的环境中，供后续步骤使用
        echo "RELEASE_TAG=$tagName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      shell: pwsh

    # 步骤 3: 下载转换器并生成规则文件
    - name: Download and process rules
      run: |
        curl -L -o mihomo.exe https://github.com/amskdaj111/rules/releases/download/mihomo/mihomo.exe
        Remove-Item -Recurse -Force yaml, mrs -ErrorAction SilentlyContinue
        mkdir yaml, mrs
        if (-not (Test-Path -Path "input.txt")) {
          echo "input.txt not found!"
          exit 1
        }
        Get-Content input.txt | ForEach-Object {
          $url = $_.Trim()
          if ($url) {
            $baseNameWithExt = $url.Split('/')[-1]
            $prefix = $baseNameWithExt.Split('.')[0]
            $yamlFile = "$prefix.yaml"
            $mrsFile = "$prefix.mrs"
            curl -L -o $yamlFile $url
            ./mihomo.exe convert-ruleset domain yaml $yamlFile $mrsFile
            Move-Item -Path $yamlFile -Destination "yaml/"
            Move-Item -Path $mrsFile -Destination "mrs/"
          }
        }

    # 步骤 4: 创建Release并上传所有独立的规则文件
    - name: Create GitHub Release and upload assets
      uses: softprops/action-gh-release@v2
      with:
        # 使用我们之前生成的唯一的、带时间戳的Tag
        tag_name: ${{ env.RELEASE_TAG }}
        # Release的标题
        name: "Rules Update ${{ env.RELEASE_TAG }}"
        # 更新了Release的正文内容，以反映文件是独立上传的
        body: |
          Automated rule files update.
          All generated `.yaml` and `.mrs` files are attached as individual assets.
        # 核心改动：使用通配符匹配所有要上传的文件
        files: |
          yaml/*
          mrs/*```

### 核心改动解析

1.  **移除了打包步骤**:
    之前的 `Package artifacts` 步骤已经被完全删除，我们不再需要创建 `.zip` 文件。

2.  **更新了 `Create GitHub Release` 步骤**:
    这是最重要的变化。
