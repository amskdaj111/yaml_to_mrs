dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - 'rule-set:private'
    - 'rule-set:ntp'
    - '+.msftconnecttest.com'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver-policy:
    '+.edu.cn': system
    '+.msftconnecttest.com': system
    'rule-set:private': system
    'rule-set:ntp': system


proxy-providers:
  airport:
    type: http
    url: "subscription_url"
    interval: 10800
    path: ./proxy_providers/airport.yaml
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 600


proxy-groups:
  - name: 🌍 泛用代理
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🏳️ 其他节点
      - DIRECT

  - name: ✈️ 电报消息
    type: select
    proxies:
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🏳️ 其他节点
      - DIRECT

  - name: 🤖 AI平台
    type: select
    use:
      - airport
    filter: "(新加坡|坡|狮城|SG|Singapore|美|US)"


  - name: ▶️ 油管视频
    type: select
    proxies:
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🏳️ 其他节点
      - DIRECT

  - name: 🅱️ 哔哩哔哩
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点

  - name: 🎓 全球学术
    type: select
    proxies:
      - DIRECT
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🏳️ 其他节点

  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT


  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🏳️ 其他节点
      - DIRECT

  - name: 🇭🇰 香港节点
    type: fallback
    use:
      - airport
    filter: "(港|HK|hk|Hong Kong|HongKong|hongkong)"
    url: https://cp.cloudflare.com/generate_204


  - name: 🇯🇵 日本节点
    type: select
    use:
      - airport
    filter: "(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan)"

  - name: 🇺🇲 美国节点
    type: fallback
    use:
      - airport
    filter: "(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)"
    url: https://cp.cloudflare.com/generate_204



  - name: 🇨🇳 台湾节点
    type: select
    use:
      - airport
    filter: "(台|新北|彰化|TW|Taiwan)"


  - name: 🇸🇬 狮城节点
    type: fallback
    use:
      - airport
    filter: "(新加坡|坡|狮城|SG|Singapore)"
    url: https://cp.cloudflare.com/generate_204


  - name: 🏳️ 其他节点
    type: select
    use:
     - airport
    filter: "^(?!.*(港|HK|hk|Hong Kong|HongKong|hongkong|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|台|新北|彰化|TW|Taiwan|新加坡|坡|狮城|SG|Singapore)).*"




